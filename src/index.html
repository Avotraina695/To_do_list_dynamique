<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced To Do List</title>
    <link rel="stylesheet" href="/src/front-end/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
<div id="app" class="container">
    <h1 class="text-center mb-5">Advanced To Do List</h1>
    <div class="row totalCompletedPending">
        <div class="col compteur">
            <p class="star-count" id="taskTotal">0</p>
            <span>Total</span>
        </div>
        <div class="col compteur">
            <p class="star-count" id="taskCompleted">0</p>
            <span>Completed</span>
        </div>
        <div class="col compteur">
            <p class="star-count" id="taskPending">0</p>
            <span>Pending</span>
        </div>
    </div>
    <div class="row">
        <form class="controls-group">
            <div class="col-lg-11 controls-input">
               <input type="text" name="title" id="inputTask" class="form-control" placeholder="Enter task here...">
                <i class="fa-solid fa-xmark" id="iconSupprime"></i>
            </div>
            <div class="col-lg-3 controls-button">
                <button type="button" id="AddTaskButton" class="btn-primary"><i class="fas fa-plus"></i>Add</button>
            </div>
        </form>
    </div>
    <div class="row">
        <div class="col-lg-3 controls-button-filter">
            <button type="button" id="completedButton">Completed</button>
        </div>
        <div class="col-lg-3 controls-button-filter">
            <button type="button" id="pendingButton">Pending</button>
        </div>
        <div class="col-lg-3 controls-button-filter">
            <button type="button" id="allButton">All</button>
        </div>
        <div class="col-lg-3 controls-button-filter">
            <button type="button" id="historyButton">History</button>
        </div>
    </div>
    <div class="ListTask">
        <ul class="list-group" id="listTask">
        </ul>
    </div>

</div>

</body>
<script type="module" src="front-end/Javascript/main.js" async></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</html>
